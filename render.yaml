databases:
  - name: solar-consumption-dashboard-db
    plan: free
    databaseName: ggv_app_production
    user: ggv_app

services:
  - type: web
    name: solar-consumption-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: solar-consumption-dashboard-db
          property: connectionString
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: PORT
        value: "10000"
      - key: HTTP_PORT
        value: "10000"
      - key: RAILS_MAX_THREADS
        value: "5"
